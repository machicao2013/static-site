<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>首页 8 个方案对比</title>
  <style>
    :root {
      --ink: #1d2329;
      --muted: #66717f;
      --line: #d9dee5;
      --paper: #fbfaf6;
      --panel: #ffffff;
      --blue: #116d8a;
      --red: #b43b2a;
      --green: #2f725b;
      --gold: #a06a24;
      --black: #111;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: #ede9df;
      font-family: "Gill Sans", "Avenir Next", "Noto Sans SC", sans-serif;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    .compare-shell {
      min-height: 100vh;
      padding: 22px;
    }

    .compare-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin: 0 auto 18px;
      max-width: 1280px;
    }

    .compare-head h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
      font-size: clamp(2rem, 4vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .compare-head p {
      margin: 8px 0 0;
      max-width: 680px;
      color: #5f625c;
    }

    .meta {
      text-align: right;
      color: #555b60;
      font-size: 0.92rem;
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 10;
      max-width: 1280px;
      margin: 0 auto 18px;
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 1px;
      padding: 1px;
      background: #161616;
      border: 1px solid #161616;
      overflow-x: auto;
    }

    .tab {
      min-width: 118px;
      min-height: 46px;
      border: 0;
      background: #faf7ed;
      color: #1f252b;
      cursor: pointer;
      padding: 8px 10px;
      text-align: left;
      white-space: nowrap;
    }

    .tab span {
      display: block;
      color: #71706a;
      font-size: 0.72rem;
    }

    .tab[aria-selected="true"] {
      background: #161616;
      color: #fff;
    }

    .tab[aria-selected="true"] span {
      color: #d6c8a1;
    }

    .preview {
      max-width: 1280px;
      margin: 0 auto;
      min-height: 760px;
      border: 1px solid #171717;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(31, 27, 20, 0.18);
    }

    .screen {
      display: none;
      min-height: 760px;
      padding: clamp(22px, 3vw, 42px);
    }

    .screen.active {
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .kicker {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .link-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .link-list a {
      display: grid;
      gap: 3px;
    }

    .link-list strong {
      font-weight: 700;
      letter-spacing: 0;
    }

    .link-list small {
      color: var(--muted);
      word-break: break-word;
    }

    .section-title {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .count {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .dashboard {
      background:
        linear-gradient(90deg, rgba(17,109,138,0.08) 1px, transparent 1px),
        linear-gradient(rgba(17,109,138,0.08) 1px, transparent 1px),
        #f8fbfa;
      background-size: 34px 34px;
      color: #17262b;
    }

    .dashboard .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 24px;
      align-items: end;
      border-bottom: 2px solid #17262b;
      padding-bottom: 22px;
    }

    .dashboard h2 {
      margin: 6px 0 0;
      font-size: clamp(2.6rem, 6vw, 6.4rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .dashboard .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid #17262b;
    }

    .dashboard .metric {
      padding: 16px;
      border-right: 1px solid #17262b;
      background: rgba(255,255,255,0.72);
    }

    .dashboard .metric:last-child { border-right: 0; }

    .dashboard .metric b {
      display: block;
      font-size: 2rem;
      line-height: 1;
    }

    .dashboard .grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }

    .dashboard section {
      min-height: 230px;
      border: 1px solid #17262b;
      background: rgba(255,255,255,0.86);
      padding: 16px;
    }

    .dashboard .link-list li + li {
      padding-top: 8px;
      border-top: 1px solid #d0dce0;
    }

    .magazine {
      background: #fbf3de;
      color: #161616;
      font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
    }

    .magazine .masthead {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 24px;
      border-bottom: 5px double #161616;
      padding-bottom: 18px;
    }

    .magazine h2 {
      margin: 0;
      max-width: 820px;
      font-size: clamp(3rem, 7vw, 8.5rem);
      line-height: 0.86;
      letter-spacing: 0;
    }

    .magazine .issue {
      text-align: right;
      font-family: "Gill Sans", "Avenir Next", "Noto Sans SC", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .magazine .lead {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
    }

    .magazine .feature {
      min-height: 420px;
      padding: 28px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(0,0,0,0.12), rgba(0,0,0,0.55)),
        repeating-linear-gradient(45deg, #b43b2a 0 12px, #d9a441 12px 24px, #1e5362 24px 36px);
      display: flex;
      align-items: end;
    }

    .magazine .feature strong {
      font-size: clamp(2rem, 5vw, 5.2rem);
      line-height: 0.95;
    }

    .magazine .columns {
      display: grid;
      gap: 16px;
    }

    .magazine section {
      border-top: 2px solid #161616;
      padding-top: 12px;
    }

    .command {
      background: #111418;
      color: #e8edf2;
      font-family: "SF Mono", Menlo, Consolas, "Noto Sans SC", monospace;
    }

    .command .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: #9aa5b1;
      border-bottom: 1px solid #333b45;
      padding-bottom: 16px;
    }

    .command h2 {
      margin: 32px 0 20px;
      font-size: clamp(2rem, 4vw, 4.6rem);
      line-height: 1;
      color: #f7f4e8;
      letter-spacing: 0;
    }

    .command .searchbox {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid #4b5664;
      background: #1a1f26;
      padding: 16px 18px;
      box-shadow: inset 0 0 0 1px #111;
    }

    .command .matrix {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }

    .command nav {
      border: 1px solid #353f4b;
      padding: 12px;
      background: #171b21;
    }

    .command nav a {
      display: flex;
      justify-content: space-between;
      padding: 10px 8px;
      color: #dce4ec;
      border-bottom: 1px solid #2a313b;
    }

    .command .results {
      display: grid;
      gap: 9px;
    }

    .command .result {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      padding: 13px 15px;
      border: 1px solid #303946;
      background: #171b21;
    }

    .command .result strong { color: #f3c96b; }

    .cards {
      background: #f7f2e8;
      color: #26231d;
    }

    .cards h2 {
      margin: 0 0 22px;
      font-size: clamp(2.8rem, 5vw, 6rem);
      font-family: "Copperplate", "Gill Sans", "Noto Sans SC", sans-serif;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .cards .shelf {
      columns: 3 260px;
      column-gap: 18px;
    }

    .cards section {
      break-inside: avoid;
      margin: 0 0 18px;
      padding: 18px;
      background: #fffdf7;
      border: 1px solid #26231d;
      box-shadow: 7px 7px 0 #26231d;
      transform: rotate(var(--tilt));
    }

    .cards section:nth-child(2n) { --tilt: 0.8deg; }
    .cards section:nth-child(2n+1) { --tilt: -0.6deg; }

    .cards .link-list a {
      padding: 9px 0;
      border-top: 1px dashed #b9aa8f;
    }

    .radar {
      background: #f4f7f2;
      color: #17281e;
      font-family: "Optima", "Avenir Next", "Noto Sans SC", sans-serif;
    }

    .radar .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 28px;
    }

    .radar aside {
      min-height: 680px;
      background: #15372c;
      color: #eef5ed;
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .radar h2 {
      margin: 0;
      font-size: clamp(2.4rem, 4vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .radar .dial {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.48);
      background:
        radial-gradient(circle, transparent 0 31%, rgba(255,255,255,0.16) 32% 33%, transparent 34% 100%),
        conic-gradient(from 45deg, #c7dca7, #e5be6c, #bd5a3a, #3b8b77, #c7dca7);
      margin: 34px 0;
    }

    .radar .board {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .radar section {
      border: 1px solid #bfd0c4;
      background: rgba(255,255,255,0.72);
      padding: 18px;
    }

    .timeline {
      background: #f9f8f1;
      color: #1d252b;
      font-family: "Baskerville", Georgia, "Noto Serif SC", serif;
    }

    .timeline .intro {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 28px;
      border-bottom: 1px solid #1d252b;
      padding-bottom: 20px;
    }

    .timeline h2 {
      margin: 0;
      font-size: clamp(2.6rem, 6vw, 7.4rem);
      line-height: 0.88;
      letter-spacing: 0;
    }

    .timeline .rail {
      margin-top: 32px;
      display: grid;
      gap: 0;
    }

    .timeline .entry {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 26px;
      border-top: 1px solid #c7c0aa;
      padding: 20px 0;
    }

    .timeline .stamp {
      color: #9a4a2b;
      font-weight: 700;
      font-family: "Gill Sans", "Avenir Next", "Noto Sans SC", sans-serif;
    }

    .library {
      background: #f5f6f7;
      color: #18222e;
    }

    .library .app {
      min-height: 690px;
      display: grid;
      grid-template-columns: 280px 1fr;
      border: 1px solid #cbd3dc;
      background: #fff;
    }

    .library aside {
      border-right: 1px solid #cbd3dc;
      background: #eef2f5;
      padding: 18px;
    }

    .library h2 {
      margin: 0 0 24px;
      font-size: 1.65rem;
      letter-spacing: 0;
    }

    .library .tree a {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #d5dce3;
    }

    .library .content {
      padding: 26px;
    }

    .library .content-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }

    .library .rows {
      display: grid;
      border-top: 1px solid #d9dfe6;
    }

    .library .row {
      display: grid;
      grid-template-columns: 1.2fr 180px 110px;
      gap: 18px;
      padding: 13px 0;
      border-bottom: 1px solid #d9dfe6;
      align-items: center;
    }

    .gallery {
      background: #161616;
      color: #f7f1e3;
    }

    .gallery h2 {
      margin: 0 0 18px;
      max-width: 760px;
      font-size: clamp(3rem, 7vw, 8rem);
      line-height: 0.86;
      font-family: "Didot", "Bodoni 72", Georgia, "Noto Serif SC", serif;
      letter-spacing: 0;
    }

    .gallery .wall {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }

    .gallery section {
      grid-column: span 4;
      min-height: 260px;
      padding: 18px;
      border: 1px solid rgba(247,241,227,0.28);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    }

    .gallery section:nth-child(2) { grid-column: span 5; background-color: #243f4b; }
    .gallery section:nth-child(3) { grid-column: span 3; background-color: #6f2e24; }
    .gallery section:nth-child(4) { grid-column: span 7; background-color: #2d4d3e; }
    .gallery section:nth-child(5) { grid-column: span 5; background-color: #785625; }

    .gallery .link-list small { color: rgba(247,241,227,0.68); }

    @media (max-width: 900px) {
      .compare-shell { padding: 12px; }
      .compare-head { grid-template-columns: 1fr; }
      .meta { text-align: left; }
      .tabs { grid-template-columns: repeat(8, 138px); }
      .dashboard .hero,
      .magazine .lead,
      .command .matrix,
      .radar .layout,
      .timeline .intro,
      .library .app {
        grid-template-columns: 1fr;
      }
      .dashboard .grid,
      .radar .board {
        grid-template-columns: 1fr;
      }
      .gallery section,
      .gallery section:nth-child(n) {
        grid-column: span 12;
      }
      .library .row {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="compare-shell">
    <header class="compare-head">
      <div>
        <h1>首页方案对比</h1>
        <p>8 个方向共用当前项目的 5 个目录与 17 个页面。这里只做视觉与信息架构对比，不替换现有首页。</p>
      </div>
      <div class="meta">static-site-2<br>homepage options</div>
    </header>

    <nav class="tabs" aria-label="首页方案">
      <button class="tab" type="button" aria-selected="true" data-target="dashboard">01 工作台<span>清晰、实用、扫描快</span></button>
      <button class="tab" type="button" aria-selected="false" data-target="magazine">02 杂志封面<span>内容感、强视觉</span></button>
      <button class="tab" type="button" aria-selected="false" data-target="command">03 指令面板<span>搜索优先、极客感</span></button>
      <button class="tab" type="button" aria-selected="false" data-target="cards">04 档案卡<span>手工目录、轻松</span></button>
      <button class="tab" type="button" aria-selected="false" data-target="radar">05 雷达板<span>数据化、专题感</span></button>
      <button class="tab" type="button" aria-selected="false" data-target="timeline">06 时间轴<span>更新流、叙事</span></button>
      <button class="tab" type="button" aria-selected="false" data-target="library">07 文档库<span>稳重、工具型</span></button>
      <button class="tab" type="button" aria-selected="false" data-target="gallery">08 展馆墙<span>大胆、作品集感</span></button>
    </nav>

    <main class="preview">
      <article class="screen dashboard active" id="dashboard" aria-label="工作台方案"></article>
      <article class="screen magazine" id="magazine" aria-label="杂志封面方案"></article>
      <article class="screen command" id="command" aria-label="指令面板方案"></article>
      <article class="screen cards" id="cards" aria-label="档案卡方案"></article>
      <article class="screen radar" id="radar" aria-label="雷达板方案"></article>
      <article class="screen timeline" id="timeline" aria-label="时间轴方案"></article>
      <article class="screen library" id="library" aria-label="文档库方案"></article>
      <article class="screen gallery" id="gallery" aria-label="展馆墙方案"></article>
    </main>
  </div>

  <script>
    const sections = [
      {
        name: "AI应用",
        pages: [
          ["Google Vertex AI 提示工程权威指南", "AI应用/google-prompt-engineer.html"],
          ["交互式 MCP Golang 开发学习指南", "AI应用/mcp.go.html"]
        ]
      },
      {
        name: "IAP开发",
        pages: [
          ["iOS IAP 黑产攻防研究报告", "IAP开发/iap_safety.html"],
          ["iOS IAP 黑产攻防研究报告", "IAP开发/iap_safety_v2.html"],
          ["StoreKit 1 vs StoreKit 2 深度技术对比报告", "IAP开发/sk1_vs_sk2.html"],
          ["苹果 ACA 深度调研报告：直播与订阅类应用商业化战略", "IAP开发/aca_report.html"]
        ]
      },
      {
        name: "其他",
        pages: [
          ["K歌平台风控分析报告 - 2026-03-11 ~ 2026-03-17", "其他/platform-report-101-20260318.html"],
          ["七天语音冒险：英文字母发音大师养成指南", "其他/7days.html"],
          ["交互式英语发音健身房", "其他/english.html"],
          ["售价计算器", "其他/pricing.html"]
        ]
      },
      {
        name: "股票基金",
        pages: [
          ["VIX指数与标普500指数关系深度研究报告", "股票基金/vix_sp500_mobile_report.html"],
          ["港股专业量化交易决策顾问 | Skill Website", "股票基金/hk_quant_advisor.html"],
          ["雪球关注用户最近发言速览 | 2026-05-10", "股票基金/xueqiu-daily-2026-05-10.html"]
        ]
      },
      {
        name: "软件应用",
        pages: [
          ["交互式 GitHub Actions 索引页生成器", "软件应用/github_action.html"],
          ["交互式教程：Cloudflare Containers 从入门到精通", "软件应用/cloudflare.html"],
          ["企业微信 AI 助理 - 交互式指南", "软件应用/qiwei_assist.html"],
          ["现代代理协议交互式指南", "软件应用/proxy.html"]
        ]
      }
    ];

    const totalPages = sections.reduce((sum, section) => sum + section.pages.length, 0);
    const allPages = sections.flatMap((section) => section.pages.map(([title, path]) => ({ title, path, section: section.name })));
    const escapeHtml = (value) => value.replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char]));
    const url = (path) => encodeURI(path);

    function listItems(pages, showPath = true) {
      return pages.map(([title, path]) => `
        <li>
          <a href="${url(path)}">
            <strong>${escapeHtml(title)}</strong>
            ${showPath ? `<small>${escapeHtml(path)}</small>` : ""}
          </a>
        </li>
      `).join("");
    }

    function sectionBlocks() {
      return sections.map((section) => `
        <section>
          <div class="section-head">
            <h3 class="section-title">${escapeHtml(section.name)}</h3>
            <span class="count">${section.pages.length} pages</span>
          </div>
          <ul class="link-list">${listItems(section.pages)}</ul>
        </section>
      `).join("");
    }

    function renderDashboard() {
      document.querySelector("#dashboard").innerHTML = `
        <div class="hero">
          <div>
            <div class="kicker">Personal Static Library</div>
            <h2>Knowledge<br>Board</h2>
          </div>
          <div class="metrics">
            <div class="metric"><b>${sections.length}</b><span>目录</span></div>
            <div class="metric"><b>${totalPages}</b><span>页面</span></div>
            <div class="metric"><b>2026</b><span>内容索引</span></div>
          </div>
        </div>
        <div class="grid">${sectionBlocks()}</div>
      `;
    }

    function renderMagazine() {
      const feature = allPages.find((page) => page.path.includes("xueqiu")) || allPages[0];
      const side = sections.filter((section) => section.name !== feature.section);
      document.querySelector("#magazine").innerHTML = `
        <div class="masthead">
          <h2>STATIC<br>REVIEW</h2>
          <div class="issue">Issue 05<br>${totalPages} Stories</div>
        </div>
        <div class="lead">
          <a class="feature" href="${url(feature.path)}"><strong>${escapeHtml(feature.title)}</strong></a>
          <div class="columns">
            ${side.map((section) => `
              <section>
                <div class="section-head">
                  <h3 class="section-title">${escapeHtml(section.name)}</h3>
                  <span class="count">${section.pages.length}</span>
                </div>
                <ul class="link-list">${listItems(section.pages.slice(0, 2), false)}</ul>
              </section>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderCommand() {
      document.querySelector("#command").innerHTML = `
        <div class="topbar"><span>~/static-site-2/index</span><span>${sections.length} dirs / ${totalPages} docs</span></div>
        <h2>Open a report, guide, or tool.</h2>
        <div class="searchbox"><span>&gt;</span><span>Search pages, categories, keywords</span><span>⌘K</span></div>
        <div class="matrix">
          <nav>${sections.map((section) => `<a href="${url(section.name + "/index.html")}"><span>${escapeHtml(section.name)}</span><span>${section.pages.length}</span></a>`).join("")}</nav>
          <div class="results">
            ${allPages.map((page, index) => `
              <a class="result" href="${url(page.path)}">
                <span><strong>${String(index + 1).padStart(2, "0")} ${escapeHtml(page.title)}</strong><small>${escapeHtml(page.path)}</small></span>
                <span>${escapeHtml(page.section)}</span>
              </a>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderCards() {
      document.querySelector("#cards").innerHTML = `
        <h2>Archive Cards</h2>
        <div class="shelf">${sectionBlocks()}</div>
      `;
    }

    function renderRadar() {
      document.querySelector("#radar").innerHTML = `
        <div class="layout">
          <aside>
            <div>
              <div class="kicker">Topic Radar</div>
              <h2>5 个主题区<br>${totalPages} 篇内容</h2>
            </div>
            <div class="dial" aria-hidden="true"></div>
            <p>适合把首页做成“情报面板”：先看到主题分布，再进入具体报告。</p>
          </aside>
          <div class="board">${sectionBlocks()}</div>
        </div>
      `;
    }

    function renderTimeline() {
      const entries = allPages.map((page, index) => ({ ...page, stamp: index < 4 ? "Recent" : page.section }));
      document.querySelector("#timeline").innerHTML = `
        <div class="intro">
          <h2>Reading Timeline</h2>
          <p>把首页变成更新流，适合强调最近新增内容和阅读路径。</p>
        </div>
        <div class="rail">
          ${entries.map((page) => `
            <a class="entry" href="${url(page.path)}">
              <span class="stamp">${escapeHtml(page.stamp)}</span>
              <span><strong>${escapeHtml(page.title)}</strong><small>${escapeHtml(page.path)}</small></span>
            </a>
          `).join("")}
        </div>
      `;
    }

    function renderLibrary() {
      document.querySelector("#library").innerHTML = `
        <div class="app">
          <aside>
            <h2>Library</h2>
            <div class="tree">${sections.map((section) => `<a href="${url(section.name + "/index.html")}"><span>${escapeHtml(section.name)}</span><span>${section.pages.length}</span></a>`).join("")}</div>
          </aside>
          <div class="content">
            <div class="content-head">
              <div>
                <div class="kicker">All documents</div>
                <h3>${totalPages} pages indexed</h3>
              </div>
              <span class="count">按目录浏览</span>
            </div>
            <div class="rows">
              ${allPages.map((page) => `
                <a class="row" href="${url(page.path)}">
                  <strong>${escapeHtml(page.title)}</strong>
                  <span>${escapeHtml(page.section)}</span>
                  <small>HTML</small>
                </a>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderGallery() {
      document.querySelector("#gallery").innerHTML = `
        <h2>Exhibition Wall</h2>
        <div class="wall">${sectionBlocks()}</div>
      `;
    }

    renderDashboard();
    renderMagazine();
    renderCommand();
    renderCards();
    renderRadar();
    renderTimeline();
    renderLibrary();
    renderGallery();

    const tabs = Array.from(document.querySelectorAll(".tab"));
    const screens = Array.from(document.querySelectorAll(".screen"));
    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((item) => item.setAttribute("aria-selected", "false"));
        screens.forEach((screen) => screen.classList.remove("active"));
        tab.setAttribute("aria-selected", "true");
        document.querySelector(`#${tab.dataset.target}`).classList.add("active");
      });
    });
  </script>
</body>
</html>
