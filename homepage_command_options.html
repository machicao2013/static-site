<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>指令面板首页 3 个方案</title>
  <style>
    :root {
      --paper: #f3efe5;
      --ink: #11151a;
      --muted: #7b8490;
      --line: #303843;
      --terminal: #11161d;
      --terminal-2: #171d25;
      --gold: #f1c75b;
      --cyan: #78d5df;
      --green: #94c973;
      --red: #d66755;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: "SF Mono", Menlo, Consolas, "Noto Sans SC", monospace;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    .wrap {
      width: min(1380px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .page-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
      font-size: clamp(2.2rem, 5vw, 5.8rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .page-head p {
      margin: 10px 0 0;
      max-width: 720px;
      color: #62645f;
      font-family: "Avenir Next", "Noto Sans SC", sans-serif;
    }

    .meta {
      text-align: right;
      color: #51565c;
      font-size: 0.9rem;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      padding: 1px;
      margin-bottom: 18px;
      background: #111;
      border: 1px solid #111;
    }

    .tab {
      min-height: 54px;
      border: 0;
      background: #fffaf0;
      color: #141414;
      text-align: left;
      padding: 10px 14px;
      cursor: pointer;
    }

    .tab span {
      display: block;
      color: #72716b;
      font-size: 0.78rem;
    }

    .tab[aria-selected="true"] {
      background: #111;
      color: #fff;
    }

    .tab[aria-selected="true"] span {
      color: #d6c078;
    }

    .screen {
      display: none;
      min-height: 760px;
      border: 1px solid #151515;
      box-shadow: 0 26px 90px rgba(30, 24, 16, 0.18);
    }

    .screen.active { display: block; }

    a { color: inherit; text-decoration: none; }

    .cmd-layout {
      min-height: 760px;
      display: grid;
      grid-template-columns: 310px 1fr;
    }

    .side {
      padding: 20px;
      border-right: 1px solid var(--line);
    }

    .main {
      padding: 22px;
      min-width: 0;
    }

    .label {
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .side h2,
    .main h2 {
      margin: 8px 0 16px;
      letter-spacing: 0;
      line-height: 1;
    }

    .side h2 { font-size: 1.4rem; }
    .main h2 { font-size: clamp(2rem, 4vw, 4.8rem); }

    .cat-list {
      display: grid;
      gap: 8px;
      margin-top: 18px;
    }

    .cat {
      min-height: 46px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border: 1px solid transparent;
      background: transparent;
      color: inherit;
      padding: 9px 10px;
      text-align: left;
      cursor: pointer;
    }

    .cat[aria-pressed="true"] {
      border-color: currentColor;
    }

    .search {
      width: 100%;
      min-height: 50px;
      border: 1px solid currentColor;
      background: transparent;
      color: inherit;
      padding: 0 14px;
      outline: 0;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin: 22px 0;
    }

    .count {
      color: var(--muted);
      white-space: nowrap;
    }

    .results {
      display: grid;
      gap: 9px;
    }

    .result {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      min-height: 64px;
      padding: 12px 14px;
      border: 1px solid transparent;
    }

    .result strong {
      display: block;
      font-weight: 700;
      letter-spacing: 0;
    }

    .result small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      word-break: break-word;
    }

    .tag {
      color: var(--muted);
      white-space: nowrap;
    }

    .v1 {
      background:
        linear-gradient(rgba(255,255,255,0.025) 50%, transparent 50%),
        var(--terminal);
      background-size: 100% 4px;
      color: #e8edf2;
    }

    .v1 .side {
      background: #0d1117;
    }

    .v1 .cat {
      border-bottom: 1px solid #2c3440;
      color: #dce4ec;
    }

    .v1 .cat[aria-pressed="true"] {
      background: #202832;
      color: var(--gold);
      box-shadow: inset 3px 0 0 var(--gold);
    }

    .v1 .search {
      background: #0d1117;
      color: #e8edf2;
      border-color: #3a4554;
    }

    .v1 .result {
      background: var(--terminal-2);
      border-color: #2f3946;
    }

    .v1 .result:hover {
      border-color: var(--gold);
      background: #202832;
    }

    .v1 .result strong { color: var(--gold); }

    .v2 {
      background: #f6f4ee;
      color: #182026;
      font-family: "Avenir Next", "Noto Sans SC", sans-serif;
    }

    .v2 .cmd-layout {
      grid-template-columns: 290px 1fr;
    }

    .v2 .side {
      background: #182026;
      color: #edf2f1;
    }

    .v2 .cat {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
    }

    .v2 .cat[aria-pressed="true"] {
      background: #f0c95b;
      color: #182026;
      border-color: #f0c95b;
    }

    .v2 .main h2 {
      max-width: 780px;
      font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
    }

    .v2 .search {
      border-radius: 8px;
      background: #fff;
      border-color: #cbd2d8;
    }

    .v2 .result {
      grid-template-columns: 52px 1fr auto;
      border: 1px solid #d4d9de;
      border-radius: 8px;
      background: #fff;
    }

    .v2 .idx {
      color: #9a6a20;
      font-weight: 800;
    }

    .v2 .result:hover {
      border-color: #182026;
      box-shadow: 6px 6px 0 #182026;
    }

    .v3 {
      background:
        linear-gradient(90deg, rgba(120,213,223,0.12) 1px, transparent 1px),
        linear-gradient(rgba(120,213,223,0.12) 1px, transparent 1px),
        #10151a;
      background-size: 28px 28px;
      color: #eef6f6;
    }

    .v3 .cmd-layout {
      grid-template-columns: 330px 1fr;
    }

    .v3 .side {
      background: rgba(13, 18, 24, 0.92);
    }

    .v3 .cat {
      border: 1px solid #273843;
      background: rgba(255,255,255,0.03);
    }

    .v3 .cat[aria-pressed="true"] {
      background: rgba(120,213,223,0.12);
      color: var(--cyan);
      border-color: var(--cyan);
    }

    .v3 .search {
      border-color: #334653;
      background: rgba(13,18,24,0.72);
      color: #eef6f6;
    }

    .v3 .result {
      position: relative;
      overflow: hidden;
      border-color: #273843;
      background: rgba(13,18,24,0.86);
    }

    .v3 .result::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--cyan);
      opacity: 0;
    }

    .v3 .result:hover {
      border-color: var(--cyan);
      transform: translateX(4px);
    }

    .v3 .result:hover::before { opacity: 1; }

    .v3 .result strong { color: #d7fbff; }

    @media (max-width: 860px) {
      .wrap { width: min(100% - 20px, 1380px); }
      .page-head,
      .tabs,
      .cmd-layout,
      .v2 .cmd-layout,
      .v3 .cmd-layout {
        grid-template-columns: 1fr;
      }
      .meta { text-align: left; }
      .side { border-right: 0; border-bottom: 1px solid var(--line); }
      .toolbar,
      .result,
      .v2 .result {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="page-head">
      <div>
        <h1>Command Home</h1>
        <p>基于「03 指令面板」收敛出的 3 套首页方案。左侧分类只筛选右侧列表，不再跳转到目录里的 index.html。</p>
      </div>
      <div class="meta">5 dirs<br>17 pages</div>
    </header>

    <nav class="tabs" aria-label="方案切换">
      <button class="tab" type="button" aria-selected="true" data-target="v1">方案 A：Terminal<span>深色终端，密度最高</span></button>
      <button class="tab" type="button" aria-selected="false" data-target="v2">方案 B：Inspector<span>浅色工作台，更稳重</span></button>
      <button class="tab" type="button" aria-selected="false" data-target="v3">方案 C：Radar<span>网格背景，科技感更强</span></button>
    </nav>

    <main>
      <article class="screen v1 active" id="v1"></article>
      <article class="screen v2" id="v2"></article>
      <article class="screen v3" id="v3"></article>
    </main>
  </div>

  <script>
    const sections = [
      {
        name: "AI应用",
        pages: [
          ["Google Vertex AI 提示工程权威指南", "AI应用/google-prompt-engineer.html"],
          ["交互式 MCP Golang 开发学习指南", "AI应用/mcp.go.html"]
        ]
      },
      {
        name: "IAP开发",
        pages: [
          ["iOS IAP 黑产攻防研究报告", "IAP开发/iap_safety.html"],
          ["iOS IAP 黑产攻防研究报告", "IAP开发/iap_safety_v2.html"],
          ["StoreKit 1 vs StoreKit 2 深度技术对比报告", "IAP开发/sk1_vs_sk2.html"],
          ["苹果 ACA 深度调研报告：直播与订阅类应用商业化战略", "IAP开发/aca_report.html"]
        ]
      },
      {
        name: "其他",
        pages: [
          ["K歌平台风控分析报告 - 2026-03-11 ~ 2026-03-17", "其他/platform-report-101-20260318.html"],
          ["七天语音冒险：英文字母发音大师养成指南", "其他/7days.html"],
          ["交互式英语发音健身房", "其他/english.html"],
          ["售价计算器", "其他/pricing.html"]
        ]
      },
      {
        name: "股票基金",
        pages: [
          ["VIX指数与标普500指数关系深度研究报告", "股票基金/vix_sp500_mobile_report.html"],
          ["港股专业量化交易决策顾问 | Skill Website", "股票基金/hk_quant_advisor.html"],
          ["雪球关注用户最近发言速览 | 2026-05-10", "股票基金/xueqiu-daily-2026-05-10.html"]
        ]
      },
      {
        name: "软件应用",
        pages: [
          ["交互式 GitHub Actions 索引页生成器", "软件应用/github_action.html"],
          ["交互式教程：Cloudflare Containers 从入门到精通", "软件应用/cloudflare.html"],
          ["企业微信 AI 助理 - 交互式指南", "软件应用/qiwei_assist.html"],
          ["现代代理协议交互式指南", "软件应用/proxy.html"]
        ]
      }
    ];

    const totalPages = sections.reduce((sum, section) => sum + section.pages.length, 0);
    const escapeHtml = (value) => value.replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char]));
    const url = (path) => encodeURI(path);
    const allPages = sections.flatMap((section) => section.pages.map(([title, path]) => ({
      title,
      path,
      section: section.name
    })));

    function shell(id, title, subtitle, mode) {
      document.querySelector(`#${id}`).innerHTML = `
        <div class="cmd-layout" data-mode="${mode}" data-active="ALL">
          <aside class="side">
            <div class="label">directories</div>
            <h2>${escapeHtml(title)}</h2>
            <div class="cat-list">
              <button class="cat" type="button" aria-pressed="true" data-section="ALL"><span>全部页面</span><span>${totalPages}</span></button>
              ${sections.map((section) => `
                <button class="cat" type="button" aria-pressed="false" data-section="${escapeHtml(section.name)}">
                  <span>${escapeHtml(section.name)}</span>
                  <span>${section.pages.length}</span>
                </button>
              `).join("")}
            </div>
          </aside>
          <section class="main">
            <div class="label">${escapeHtml(subtitle)}</div>
            <h2>${id === "v1" ? "Open a report, guide, or tool." : id === "v2" ? "Browse the site from one command surface." : "Signal map for every saved page."}</h2>
            <div class="toolbar">
              <input class="search" type="search" placeholder="搜索标题、路径或分类" aria-label="搜索标题、路径或分类">
              <span class="count"></span>
            </div>
            <div class="results"></div>
          </section>
        </div>
      `;
    }

    function resultMarkup(page, index, mode) {
      if (mode === "inspector") {
        return `
          <a class="result" href="${url(page.path)}" data-section="${escapeHtml(page.section)}" data-text="${escapeHtml(`${page.title} ${page.path} ${page.section}`.toLowerCase())}">
            <span class="idx">${String(index + 1).padStart(2, "0")}</span>
            <span><strong>${escapeHtml(page.title)}</strong><small>${escapeHtml(page.path)}</small></span>
            <span class="tag">${escapeHtml(page.section)}</span>
          </a>
        `;
      }
      return `
        <a class="result" href="${url(page.path)}" data-section="${escapeHtml(page.section)}" data-text="${escapeHtml(`${page.title} ${page.path} ${page.section}`.toLowerCase())}">
          <span><strong>${String(index + 1).padStart(2, "0")} ${escapeHtml(page.title)}</strong><small>${escapeHtml(page.path)}</small></span>
          <span class="tag">${escapeHtml(page.section)}</span>
        </a>
      `;
    }

    function wireScreen(screen) {
      const layout = screen.querySelector(".cmd-layout");
      const mode = layout.dataset.mode;
      const results = screen.querySelector(".results");
      const count = screen.querySelector(".count");
      const search = screen.querySelector(".search");
      const cats = Array.from(screen.querySelectorAll(".cat"));
      results.innerHTML = allPages.map((page, index) => resultMarkup(page, index, mode)).join("");
      const items = Array.from(results.querySelectorAll(".result"));

      function apply() {
        const active = layout.dataset.active;
        const query = search.value.trim().toLowerCase();
        let visible = 0;
        for (const item of items) {
          const sectionMatch = active === "ALL" || item.dataset.section === active;
          const queryMatch = !query || item.dataset.text.includes(query);
          const show = sectionMatch && queryMatch;
          item.hidden = !show;
          if (show) visible += 1;
        }
        count.textContent = `${visible} / ${totalPages} pages`;
      }

      cats.forEach((cat) => {
        cat.addEventListener("click", () => {
          layout.dataset.active = cat.dataset.section;
          cats.forEach((item) => item.setAttribute("aria-pressed", "false"));
          cat.setAttribute("aria-pressed", "true");
          apply();
        });
      });
      search.addEventListener("input", apply);
      apply();
    }

    shell("v1", "site index", "terminal mode", "terminal");
    shell("v2", "content inspector", "single-page browser", "inspector");
    shell("v3", "topic radar", "filtered signal list", "radar");
    document.querySelectorAll(".screen").forEach(wireScreen);

    const tabs = Array.from(document.querySelectorAll(".tab"));
    const screens = Array.from(document.querySelectorAll(".screen"));
    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((item) => item.setAttribute("aria-selected", "false"));
        screens.forEach((screen) => screen.classList.remove("active"));
        tab.setAttribute("aria-selected", "true");
        document.querySelector(`#${tab.dataset.target}`).classList.add("active");
      });
    });
  </script>
</body>
</html>
